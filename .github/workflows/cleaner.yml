---
name: 🗑 3-Clean downloads folder

on:
  workflow_dispatch:
    inputs:
      warning:
        description: '⚠️ WARNING: This will DELETE ALL files inside downloads/ folder. Click "Run workflow" only if you are sure.'
        required: false
        default: 'Read this warning before proceeding'

jobs:
  delete:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean downloads folder
        run: |
          echo "AVASAM (https://avasam.ir) - Cleaning downloads folder"
          echo ""

          # Remove the entire downloads folder if it exists
          if [ -d "downloads" ]; then
            echo "Removing all files in downloads/..."
            rm -rf downloads/
            echo "Downloads folder removed."
          else
            echo "Downloads folder doesn't exist yet."
          fi

          # Recreate the folder with a placeholder README
          mkdir -p downloads

          {
            echo "# Downloads"
            echo ""
            echo "---"
            echo ""
            echo "## NO FILE DOWNLOADED YET!"
            echo ""
            echo "Use the download workflows to add files here."
            echo ""
            echo "---"
            echo ""
            echo "*This tool created by [avasam.ir](https://avasam.ir)*"
          } > downloads/README.md

          echo ""
          echo "=========================================="
          echo "✅ Downloads folder cleared successfully!"
          echo "AVASAM (https://avasam.ir)"
          echo "=========================================="
